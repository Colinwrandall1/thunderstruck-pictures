<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thunderstruck Pictures — Product</title>
<meta name="description" content="Thunderstruck Pictures equipment rental — product detail.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  :root{
    --bg:#04060c; --panel:#0e141c; --panel-2:#121a24; --line:#1f2a38; --line-bright:#33485f;
    --text:#f4f8ff; --muted:#9fb4ce; --dim:#6b7681; --yellow:#9fc4ee;
  }
  html{ scroll-behavior:smooth; }
  body{ background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif; line-height:1.55; overflow-x:hidden; }
  a{ color:inherit; text-decoration:none; }
  .wrap{ max-width:1200px; margin:0 auto; padding:0 clamp(1.2rem,4vw,3rem); }

  /* NAV — identical to interior pages */
  .nav{ position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between;
    padding:0.85rem clamp(1.2rem,4vw,3rem); background:rgba(6,8,11,0.9); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
  .nav .brand{ font-family:'Saira Condensed',sans-serif; font-weight:700; font-style:italic; text-transform:uppercase; font-size:1.35rem; letter-spacing:0.06em; }
  .nav .links{ display:flex; align-items:center; gap:1.25rem; flex-wrap:nowrap; }
  .nav .links a{ font-size:0.78rem; letter-spacing:0.04em; text-transform:uppercase; color:#c7d0da; transition:color 0.2s; white-space:nowrap; }
  .nav .links a:hover{ color:#fff; }
  .nav .links a.current{ color:var(--yellow); }
  @media (max-width:960px){ .nav .links a:not(.cart-trigger){ display:none; } }
  .cart-trigger{ display:inline-flex; align-items:center; gap:0.55rem; background:var(--panel); border:1px solid var(--line);
    padding:0.5rem 0.9rem; font-family:'Saira Condensed',sans-serif; font-size:0.85rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text); transition:border-color 0.15s,color 0.15s; }
  .cart-trigger:hover{ border-color:var(--yellow); color:var(--yellow); }
  .cart-trigger .count{ background:var(--yellow); color:#0a0a0a; padding:0.1rem 0.5rem; font-size:0.8rem; min-width:1.5rem; text-align:center; }
  .cart-trigger .count.zero{ background:var(--line); color:var(--muted); }

  /* SLIM RHERO */
  .rhero{ position:relative; overflow:hidden; border-bottom:1px solid var(--line); isolation:isolate; }
  .rhero .bg{ position:absolute; inset:0; z-index:0; background:url("assets/hero-plate-lit.webp") center 40%/cover no-repeat; filter:saturate(0.7) brightness(0.4); }
  .rhero::after{ content:""; position:absolute; inset:0; z-index:1; pointer-events:none;
    background:linear-gradient(180deg, rgba(5,6,8,0.45) 0%, rgba(5,6,8,0.8) 70%, var(--bg) 100%); }
  .rhero .inner{ position:relative; z-index:2; padding:clamp(2rem,5vw,3.5rem) 0 clamp(1.5rem,3vw,2.2rem); }
  .breadcrumb{ font-family:'JetBrains Mono',monospace; font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:1rem; }
  .breadcrumb a:hover{ color:var(--yellow); }
  .breadcrumb .sep{ color:var(--line-bright); margin:0 0.5rem; }
  .tag-line{ font-family:'JetBrains Mono',monospace; font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--yellow); margin-bottom:0.6rem; }
  .rhero h1{ font-family:'Saira Condensed',sans-serif; font-weight:700; font-style:italic; font-size:clamp(2rem,4.8vw,3.6rem); line-height:0.95; text-transform:uppercase; letter-spacing:0.01em; max-width:18ch; }
  .rhero h1 .y{ color:var(--yellow); }
  .rhero .blurb{ margin-top:1.1rem; font-size:1.02rem; line-height:1.6; color:#cdd6df; max-width:62ch; }

  /* MAIN PRODUCT BLOCK */
  main{ max-width:1200px; margin:0 auto; padding:clamp(2rem,4vw,3rem) clamp(1.2rem,4vw,3rem) clamp(3rem,6vw,5rem); }
  .pgrid{ display:grid; grid-template-columns:1.3fr 1fr; gap:clamp(2rem,4vw,3.5rem); align-items:start; }
  @media (max-width:880px){ .pgrid{ grid-template-columns:1fr; gap:2rem; } }

  /* PRODUCT IMAGE (light plate style, matches catalog cards) */
  .pimage{ position:relative; background:#e9e6df; border:1px solid var(--line); border-radius:6px; aspect-ratio:1/1;
    display:flex; align-items:center; justify-content:center; padding:clamp(1.6rem,3vw,2.6rem); overflow:hidden; }
  .pimage img{ max-width:88%; max-height:88%; object-fit:contain; mix-blend-mode:multiply; }
  .pimage .badge{ position:absolute; top:0.9rem; left:0.9rem; font-family:'JetBrains Mono',monospace; font-size:0.62rem; letter-spacing:0.18em; text-transform:uppercase; color:#555; border:1px solid rgba(0,0,0,0.15); padding:0.25rem 0.55rem; background:rgba(255,255,255,0.85); }
  .pimage.soon{ background:#10161e; }
  .pimage.soon svg{ width:46px; height:62px; color:#33404c; }

  /* INFO COLUMN */
  .pinfo{ display:flex; flex-direction:column; gap:1.4rem; }
  .brand-label{ font-family:'JetBrains Mono',monospace; font-size:0.66rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--muted); }
  .pname{ font-family:'Saira Condensed',sans-serif; font-weight:700; font-size:clamp(1.6rem,2.6vw,2.1rem); text-transform:uppercase; letter-spacing:0.01em; margin-top:-0.3rem; }
  .pspec{ color:var(--muted); font-size:0.96rem; line-height:1.6; }
  .price-row{ border:1px solid var(--line); background:var(--panel); padding:1.1rem 1.2rem; border-radius:6px;
    display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
  .price-row .day{ font-family:'Saira Condensed',sans-serif; font-weight:700; font-size:2rem; color:var(--yellow); line-height:1; }
  .price-row .unit{ color:var(--dim); font-family:'JetBrains Mono',monospace; font-size:0.7rem; letter-spacing:0.16em; text-transform:uppercase; margin-left:0.4rem; }
  .price-row .note{ color:var(--dim); font-size:0.78rem; line-height:1.5; flex:1 1 200px; min-width:0; text-align:right; }

  /* ACTION BUTTON / STEPPER */
  .add-btn{ display:flex; align-items:center; justify-content:center; gap:.5rem; width:100%; cursor:pointer;
    background:linear-gradient(180deg,#ffffff,#cdddf0 45%,#9fb4ce 55%,#eaf2fb); color:#0a0f16;
    font-family:'Saira Condensed',sans-serif; font-weight:700; font-size:1.05rem; letter-spacing:0.14em; text-transform:uppercase;
    padding:1.05rem 1.5rem; border:none; border-radius:4px; box-shadow:0 0 18px rgba(150,190,255,.25), inset 0 1px 0 rgba(255,255,255,.85); transition:filter .15s, transform .15s; }
  .add-btn:hover{ filter:brightness(1.05); transform:translateY(-1px); }
  .stepper{ display:flex; align-items:center; gap:.5rem; border:1px solid var(--yellow); border-radius:4px; padding:0.5rem; }
  .stepper button{ background:var(--panel); border:1px solid var(--line); color:var(--text); font-family:'Saira Condensed',sans-serif; font-weight:700; font-size:1.2rem; padding:0.4rem 1rem; cursor:pointer; border-radius:3px; transition:border-color .15s, color .15s; }
  .stepper button:hover{ border-color:var(--yellow); color:var(--yellow); }
  .stepper .qty{ flex:1; text-align:center; font-family:'Saira Condensed',sans-serif; font-weight:700; font-size:1.05rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--yellow); }
  .view-quote{ display:inline-block; margin-top:0.4rem; padding:0.7rem 1.1rem; font-family:'Saira Condensed',sans-serif; font-weight:700; font-size:0.9rem; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--text); border:1px solid var(--line-bright); border-radius:4px; text-align:center; transition:border-color .15s, color .15s; }
  .view-quote:hover{ border-color:var(--yellow); color:var(--yellow); }
  .build-link{ color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:0.75rem; letter-spacing:0.12em; text-transform:uppercase; margin-top:0.4rem; }
  .build-link a{ color:var(--yellow); }
  .build-link a:hover{ text-decoration:underline; }

  /* DETAIL SECTIONS — kit list + description */
  .pdetail{ margin-top:clamp(3rem,5vw,4.5rem); display:grid; grid-template-columns:1fr 1fr; gap:clamp(2rem,4vw,3.5rem); }
  @media (max-width:760px){ .pdetail{ grid-template-columns:1fr; gap:2rem; } }
  .sec-eyebrow{ font-family:'JetBrains Mono',monospace; font-size:0.7rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--yellow); margin-bottom:1rem; }
  .sec-h{ font-family:'Saira Condensed',sans-serif; font-weight:700; font-size:clamp(1.4rem,2.4vw,1.85rem); text-transform:uppercase; letter-spacing:0.01em; margin-bottom:1.4rem; }
  .sec-h .y{ color:var(--yellow); }
  .kit-list{ list-style:none; display:grid; gap:0.1rem; }
  .kit-list li{ display:flex; align-items:flex-start; gap:0.75rem; padding:0.85rem 0; border-bottom:1px solid var(--line); color:#cdd6df; font-size:0.96rem; }
  .kit-list li:last-child{ border-bottom:none; }
  .kit-list li::before{ content:""; width:6px; height:6px; background:var(--yellow); margin-top:0.5rem; flex:0 0 6px; transform:rotate(45deg); }
  .descr p{ color:var(--muted); font-size:0.98rem; line-height:1.7; margin-bottom:1rem; }
  .descr p:last-child{ margin-bottom:0; }

  /* RELATED — horizontal scroll cards */
  .related{ margin-top:clamp(3rem,5vw,4.5rem); }
  .related-head{ display:flex; align-items:baseline; justify-content:space-between; gap:1rem; margin-bottom:1.4rem; }
  .related-head a{ font-family:'JetBrains Mono',monospace; font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--yellow); }
  .related-head a:hover{ text-decoration:underline; }
  .rel-row{ display:flex; gap:1rem; overflow-x:auto; padding-bottom:0.6rem; scroll-snap-type:x mandatory; }
  .rel-card{ flex:0 0 220px; background:var(--panel); border:1px solid var(--line); border-radius:6px; overflow:hidden; scroll-snap-align:start;
    transition:border-color .2s, transform .2s; text-decoration:none; color:inherit; }
  .rel-card:hover{ border-color:var(--yellow); transform:translateY(-3px); }
  .rel-card .thumb{ aspect-ratio:4/3; background:#e9e6df; display:flex; align-items:center; justify-content:center; padding:0.7rem; }
  .rel-card .thumb img{ max-width:90%; max-height:88%; object-fit:contain; mix-blend-mode:multiply; }
  .rel-card .thumb.soon{ background:#10161e; }
  .rel-card .thumb.soon svg{ width:24px; height:32px; color:#33404c; }
  .rel-card .b{ padding:0.85rem 1rem 1rem; }
  .rel-card .b .bn{ font-family:'JetBrains Mono',monospace; font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--dim); }
  .rel-card .b .nm{ font-family:'Saira Condensed',sans-serif; font-weight:700; font-size:1.05rem; text-transform:uppercase; letter-spacing:0.01em; margin-top:0.2rem; line-height:1.15; }
  .rel-card .b .pr{ color:var(--yellow); font-family:'Saira Condensed',sans-serif; font-weight:700; margin-top:0.5rem; font-size:0.95rem; letter-spacing:0.05em; }

  /* NOT FOUND state */
  .nf{ max-width:600px; margin:6rem auto; text-align:center; }
  .nf h1{ font-family:'Saira Condensed',sans-serif; font-weight:700; font-size:2rem; text-transform:uppercase; margin-bottom:1rem; }
  .nf p{ color:var(--muted); margin-bottom:2rem; }

  /* FOOTER */
  footer{ background:#04060a; border-top:1px solid var(--line); padding:2.5rem clamp(1.2rem,4vw,3rem); }
  .foot-in{ max-width:1200px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap; }
  .foot-in .brand{ font-family:'Saira Condensed',sans-serif; font-weight:700; font-style:italic; text-transform:uppercase; letter-spacing:0.04em; font-size:1.1rem; }
  .foot-in .small{ color:#6b7681; font-size:0.75rem; font-family:'JetBrains Mono',monospace; letter-spacing:0.1em; }
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="brand">Thunderstruck</a>
  <div class="links">
    <a href="camera.html">Camera</a>
    <a href="rentals.html">Lighting</a>
    <a href="grip-truck.html">Grip</a>
    <a href="sound.html">Audio</a>
    <a href="production.html">Production</a>
    <a href="contact.html">Contact</a>
    <a href="#" class="cart-trigger" id="navQuote" aria-label="View quote"><span>Quote</span><span class="count zero" id="cartCount">0</span></a>
  </div>
</nav>

<div id="app"><!-- product renders here --></div>

<footer>
  <div class="foot-in">
    <span class="brand">Thunderstruck Pictures</span>
    <span class="small">© 2026 Thunderstruck Pictures LLC · Stray Vista Studios · Dripping Springs, TX</span>
  </div>
</footer>

<script src="inventory.js"></script>
<script src="product-details.js"></script>
<script>
const DEPT_LABEL = { camera:'Camera', lighting:'Lighting', grip:'Grip', sound:'Audio' };
const DEPT_PAGE  = { camera:'camera.html', lighting:'rentals.html', grip:'grip-truck.html', sound:'sound.html' };
const CART_KEY = 'ts-cart';

function loadCart(){
  try { const r=localStorage.getItem(CART_KEY); if(r){ const p=JSON.parse(r); return {cart:p.cart||{}, days:p.days||1}; } } catch(e){}
  return {cart:{}, days:1};
}
function saveCart(c){ try{ localStorage.setItem(CART_KEY, JSON.stringify(c)); }catch(e){} }
function cartTotal(c){ return Object.values(c.cart||{}).reduce((a,b)=>a+(b||0),0); }
function updateNavCount(){
  const c=loadCart(); const n=cartTotal(c);
  const el=document.getElementById('cartCount'); if(el){ el.textContent=n; el.classList.toggle('zero', n===0); }
  document.getElementById('navQuote').setAttribute('href', n>0 ? DEPT_PAGE[currentItem?.dept] || 'rentals.html' : 'rentals.html');
}

let currentItem = null;

function getItemId(){
  const u = new URLSearchParams(location.search);
  return u.get('id') || u.get('p') || '';
}

function render(){
  const id = getItemId();
  if (!id) return renderNotFound("No product specified.");
  const item = INVENTORY.find(i => i.id === id);
  if (!item) return renderNotFound(`We couldn't find "${id}".`);
  currentItem = item;
  const det = (typeof PRODUCT_DETAILS !== 'undefined' && PRODUCT_DETAILS[id]) || {};
  document.title = `Thunderstruck Pictures — ${item.name}`;

  const photo = item.photo ? `<img src="media/products/${id}.webp" alt="${item.name}">` :
    `<svg viewBox="0 0 24 32" fill="currentColor"><path d="M13 0 L2 18 H10 L7 32 L22 11 H13 Z"/></svg>`;
  const photoClass = item.photo ? '' : 'soon';

  const blurbHtml = det.blurb ? `<p class="blurb">${det.blurb}</p>` : '';
  const kitHtml = (det.kit && det.kit.length) ?
    det.kit.map(k => `<li>${k}</li>`).join('') :
    `<li style="color:var(--dim); font-style:italic;">Kit list coming soon.</li>`;
  const descHtml = (det.description && det.description.length) ?
    det.description.map(p => `<p>${p}</p>`).join('') :
    `<p style="color:var(--dim); font-style:italic;">Full description coming soon.</p>`;

  // Related: up to 4 other items in the same department, excluding self
  const related = INVENTORY.filter(i => i.dept === item.dept && i.id !== id).slice(0, 6);

  document.getElementById('app').innerHTML = `
    <section class="rhero">
      <div class="bg" aria-hidden="true"></div>
      <div class="inner wrap">
        <div class="breadcrumb">
          <a href="index.html">Home</a> <span class="sep">/</span>
          <a href="${DEPT_PAGE[item.dept]}">${DEPT_LABEL[item.dept]}</a> <span class="sep">/</span>
          <span style="color:#cdd6df;">${item.name}</span>
        </div>
        <p class="tag-line">${item.brand} · ${item.tag}</p>
        <h1>${item.name.replace(/\s+(\S+)$/, ' <span class="y">$1</span>')}</h1>
        ${blurbHtml}
      </div>
    </section>

    <main>
      <div class="pgrid">
        <div class="pimage ${photoClass}">
          <span class="badge">${item.tag}</span>
          ${photo}
        </div>
        <aside class="pinfo">
          <div>
            <div class="brand-label">${item.brand}</div>
            <h2 class="pname">${item.name}</h2>
          </div>
          <p class="pspec">${item.spec}</p>
          <div class="price-row">
            <div><span class="day">$${item.day}</span><span class="unit">/ day</span></div>
            <div class="note">Multi-day &amp; weekly rates calculated at quote stage.</div>
          </div>
          <div id="actionSlot"></div>
          <p class="build-link">Building a package? <a href="${DEPT_PAGE[item.dept]}">Browse the full ${DEPT_LABEL[item.dept]} package →</a></p>
        </aside>
      </div>

      <div class="pdetail">
        <div>
          <p class="sec-eyebrow">In the kit</p>
          <h2 class="sec-h">What's <span class="y">included.</span></h2>
          <ul class="kit-list">${kitHtml}</ul>
        </div>
        <div>
          <p class="sec-eyebrow">The story</p>
          <h2 class="sec-h">Why this <span class="y">gear.</span></h2>
          <div class="descr">${descHtml}</div>
        </div>
      </div>

      <div class="related">
        <div class="related-head">
          <h2 class="sec-h">More from the <span class="y">${DEPT_LABEL[item.dept]} package.</span></h2>
          <a href="${DEPT_PAGE[item.dept]}">See all ${DEPT_LABEL[item.dept]} →</a>
        </div>
        <div class="rel-row">
          ${related.map(r => `
            <a class="rel-card" href="product.html?id=${r.id}">
              <div class="thumb ${r.photo?'':'soon'}">${
                r.photo ? `<img src="media/products/${r.id}.webp" alt="${r.name}" loading="lazy">` :
                          `<svg viewBox="0 0 24 32" fill="currentColor"><path d="M13 0 L2 18 H10 L7 32 L22 11 H13 Z"/></svg>`}</div>
              <div class="b">
                <div class="bn">${r.brand}</div>
                <div class="nm">${r.name}</div>
                <div class="pr">$${r.day} / day</div>
              </div>
            </a>`).join('')}
        </div>
      </div>
    </main>
  `;
  renderAction();
  updateNavCount();
}

function renderNotFound(msg){
  document.getElementById('app').innerHTML = `
    <div class="nf">
      <h1>Product not found</h1>
      <p>${msg}</p>
      <a href="all.html" class="view-quote">Browse the kit</a>
    </div>`;
}

function renderAction(){
  if (!currentItem) return;
  const slot = document.getElementById('actionSlot');
  const c = loadCart();
  const qty = c.cart[currentItem.id] || 0;
  if (qty > 0){
    slot.innerHTML = `
      <div class="stepper">
        <button data-act="dec">−</button>
        <span class="qty">${qty} in quote</span>
        <button data-act="inc">+</button>
      </div>
      <a class="view-quote" href="${DEPT_PAGE[currentItem.dept]}">View quote &amp; send request →</a>`;
    slot.querySelector('[data-act="inc"]').onclick = () => { change(+1); };
    slot.querySelector('[data-act="dec"]').onclick = () => { change(-1); };
  } else {
    slot.innerHTML = `<button class="add-btn" id="addBtn">+ Add to quote</button>`;
    slot.querySelector('#addBtn').onclick = () => { change(+1); };
  }
}

function change(delta){
  const c = loadCart();
  const id = currentItem.id;
  c.cart[id] = (c.cart[id] || 0) + delta;
  if (c.cart[id] <= 0) delete c.cart[id];
  saveCart(c);
  renderAction();
  updateNavCount();
}

render();
</script>
</body>
</html>
