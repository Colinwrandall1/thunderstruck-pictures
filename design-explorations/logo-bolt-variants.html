<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thunderstruck — final logo lockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:ital,wght@0,600;0,700;1,600;1,700;1,800&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:'Saira Condensed',system-ui,sans-serif; background:#0a0e16; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; }
  .cell{ min-height:380px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.6rem; padding:3.5rem; }
  .dark{ background:#0a0e16; }
  .light{ background:#b9c0c9; }       /* grey, like the client mockup */
  .tag{ font-family:'JetBrains Mono',monospace; font-size:0.62rem; letter-spacing:0.24em; text-transform:uppercase; }
  .dark .tag{ color:#5e7089; } .light .tag{ color:#5b6470; }

  /* ---- lockup: real bolt image behind the exact wordmark ---- */
  .lockup{ position:relative; display:inline-flex; flex-direction:column; align-items:center; line-height:1; }
  .bolt-img{ position:absolute; left:55%; top:50%; transform:translate(-50%,-52%); z-index:0; pointer-events:none; }
  .bolt-img.glow{ height:230%; }
  .bolt-img.vec{ height:250%; }
  /* the vector bolt ships white (great on dark); flip it to ink on light backgrounds */
  .light .bolt-img.vec{ filter:brightness(0) opacity(0.82); }

  .word{ position:relative; z-index:1; font-weight:800; font-style:italic; text-transform:uppercase;
    font-size:5rem; letter-spacing:0.01em; line-height:0.8; white-space:nowrap; }
  .sub{ position:relative; z-index:1; font-weight:600; text-transform:uppercase; text-align:center; width:100%;
    font-size:1.02rem; letter-spacing:0.62em; text-indent:0.62em; margin-top:0.25rem; }
  .dark .word, .dark .sub{ color:#f2f6fc; }
  .light .word, .light .sub{ color:#10161e; }
</style>
</head>
<body>

<div class="grid">
  <div class="cell dark">
    <span class="tag">Stylized · glow bolt · on dark</span>
    <span class="lockup"><img class="bolt-img glow" src="../media/bolt-glow.png" alt=""><span class="word">THUNDERSTRUCK</span><span class="sub">Pictures</span></span>
  </div>
  <div class="cell light">
    <span class="tag">Stylized · glow bolt · on grey</span>
    <span class="lockup"><img class="bolt-img glow" src="../media/bolt-glow.png" alt=""><span class="word">THUNDERSTRUCK</span><span class="sub">Pictures</span></span>
  </div>
  <div class="cell dark">
    <span class="tag">Simple · vector bolt · on dark</span>
    <span class="lockup"><img class="bolt-img vec" src="../media/bolt-vector.png" alt=""><span class="word">THUNDERSTRUCK</span><span class="sub">Pictures</span></span>
  </div>
  <div class="cell light">
    <span class="tag">Simple · vector bolt · on grey</span>
    <span class="lockup"><img class="bolt-img vec" src="../media/bolt-vector.png" alt=""><span class="word">THUNDERSTRUCK</span><span class="sub">Pictures</span></span>
  </div>
</div>

</body>
</html>
