[build]
  publish = "public"
  command = "rm -rf public && mkdir -p public/assets public/media && cp index.html inventory-options.html product.html product-details.js home-navy.html home-video.html all.html production.html rentals.html camera.html grip-truck.html sound.html contact.html home-options.html home-reveal.html home-reveal-3.html card-styles.html inventory.js nav-mobile.js public/ && cp assets/bolt.png assets/hero-plate.webp assets/hero-plate-lit.webp assets/clouds-bg.jpg assets/inventory-shot.webp public/assets/ && cp -R assets/hero-frames public/assets/hero-frames && cp -R media/products public/media/products && cp media/truck.webp media/truck-profile.webp media/hero-truck.mp4 media/hero-truck.webm media/hero-truck-poster.webp media/martin-shapiro.jpg media/taylor-randall.jpg public/media/ && (cp thunderstruck-mark-cut.png public/ 2>/dev/null || true)"
