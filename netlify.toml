[build]
  publish = "public"
  command = "rm -rf public && mkdir -p public/assets public/media && cp index.html rentals.html camera.html grip-truck.html contact.html home-options.html home-reveal.html home-reveal-3.html card-styles.html inventory.js public/ && cp assets/bolt.png assets/hero-plate.webp assets/hero-plate-lit.webp assets/clouds-bg.jpg public/assets/ && cp -R assets/hero-frames public/assets/hero-frames && cp -R media/products public/media/products && cp media/truck.webp media/truck-profile.webp public/media/ && (cp thunderstruck-mark-cut.png public/ 2>/dev/null || true)"
