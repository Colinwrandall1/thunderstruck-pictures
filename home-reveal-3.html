<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thunderstruck Pictures — Grip Truck Rental &amp; Production · Austin, TX</title>
<meta name="description" content="Austin's grip &amp; lighting truck and production company, owned and run by working filmmakers. RED, DZOFilm, Aputure, Nanlux and more — delivered on a 3-ton truck. Build a quote in minutes.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #04060c;
    --panel: #0e141c;
    --panel-2: #121a24;
    --line: #1f2a38;
    --text: #f4f8ff;
    --muted: #9fb4ce;
    --yellow: #9fc4ee;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* ---------- NAV ---------- */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.8rem clamp(1.2rem, 4vw, 3rem);
    background: rgba(6,8,11,0.88);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    /* Hidden through the entire storm reveal; slides in only once the hero
       animation has finished, so it never competes with the effect. */
    opacity: 0; transform: translateY(-100%); pointer-events: none;
    transition: opacity 0.35s ease, transform 0.45s cubic-bezier(0.16,1,0.3,1);
  }
  .nav.revealed { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .nav .brand {
    font-family: 'Saira Condensed', sans-serif; text-transform: uppercase;
    font-size: 1.35rem; letter-spacing: 0.06em; line-height: 1;
  }
  .nav .links { display: flex; align-items: center; gap: 2rem; }
  .nav .links a {
    font-size: 0.82rem; letter-spacing: 0.04em; color: #c7d0da;
    text-transform: uppercase; transition: color 0.2s;
  }
  .nav .links a:hover { color: #fff; }
  .nav .links a.soon { color: #5f6b77; }
  .nav .links a.soon::after {
    content: "soon"; font-family: 'JetBrains Mono', monospace; font-size: 0.55rem;
    color: var(--yellow); margin-left: 0.35rem; vertical-align: super; letter-spacing: 0.1em;
  }
  .cart-trigger {
    display: inline-flex; align-items: center; gap: 0.55rem;
    background: var(--panel); border: 1px solid var(--line);
    padding: 0.5rem 0.9rem; font-family: 'Saira Condensed', sans-serif; font-size: 0.85rem;
    text-transform: uppercase; letter-spacing: 0.1em; color: var(--text);
    transition: border-color 0.15s, color 0.15s;
  }
  .cart-trigger:hover { border-color: var(--yellow); color: var(--yellow); }
  .cart-trigger .count { background: var(--yellow); color: #0a0a0a; padding: 0.1rem 0.5rem; font-size: 0.8rem; min-width: 1.5rem; text-align: center; }
  .cart-trigger .count.zero { background: var(--line); color: var(--muted); }
  .btn {
    display:inline-block; cursor:pointer;
    background:linear-gradient(180deg,#ffffff,#cdddf0 45%,#9fb4ce 55%,#eaf2fb);
    color:#0a0f16; font-family:'Saira Condensed',sans-serif; font-weight:700;
    font-size:0.92rem; letter-spacing:0.14em; text-transform:uppercase;
    padding:0.72rem 1.5rem; border:none; border-radius:3px;
    box-shadow:0 0 18px rgba(150,190,255,0.3), inset 0 1px 0 rgba(255,255,255,0.85);
    transition:transform .15s, box-shadow .2s;
  }
  .btn:hover { transform:translateY(-1px); box-shadow:0 0 26px rgba(150,190,255,0.5), inset 0 1px 0 rgba(255,255,255,0.95); }
  .btn.ghost { background:transparent; color:var(--text); border:1px solid #33485f; box-shadow:none; }
  .btn.ghost:hover { border-color:#9fc4ee; box-shadow:0 0 16px rgba(159,196,238,0.25); }
  @media (max-width: 760px) { .nav .links a:not(.cart-trigger) { display: none; } }

  /* ---------- HERO (storm reveal) ---------- */
  .hero-track { height: 320vh; position: relative; }
  .hero-stage { position: sticky; top: 0; height: 100vh; overflow: hidden; background: var(--bg); }
  .hero-photo {
    position: absolute; inset: -2%;
    filter: brightness(var(--exposure, 0.45)) contrast(var(--contrast, 1.06)) saturate(var(--sat, 0.82));
    will-change: filter;
  }
  .hero-plate, .hero-plate-lit {
    position: absolute; inset: 0;
    background-color: #05070a; background-size: cover; background-position: center center; background-repeat: no-repeat;
  }
  .hero-plate {
    background-image:
      url("assets/hero-plate.webp"),
      linear-gradient(180deg, #0b0f15 0%, #070a0f 55%, #04060a 100%);
  }
  .hero-plate-lit { background-image: url("assets/hero-plate-lit.webp"); opacity: var(--reveal, 0); will-change: opacity; }
  .hero-bolt {
    position: absolute; top: -2%; left: 47%; transform: translateX(-50%);
    height: 74%; width: auto; pointer-events: none; opacity: var(--bolt, 0); will-change: opacity;
    filter: drop-shadow(0 0 22px rgba(150,190,255,0.45));
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, transparent 34%, #000 52%, #000 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, transparent 34%, #000 52%, #000 100%);
  }
  .hero-flash {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(58% 48% at 49% 25%, rgba(234,242,255,1) 0%, rgba(150,190,255,0.72) 42%, rgba(90,140,230,0) 82%);
    opacity: var(--flash, 0); mix-blend-mode: screen; will-change: opacity;
  }
  .hero-vignette {
    position: absolute; inset: 0; pointer-events: none;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 26%),
      radial-gradient(140% 110% at 47% 60%, rgba(0,0,0,0) 60%, rgba(0,0,0,0.42) 100%);
  }
  .hero-content {
    position: absolute; left: 0; right: 0; top: 50%; transform: translateY(calc(-50% + var(--content-y, 16px)));
    text-align: center; padding: 0 1.5rem;
    opacity: var(--content, 0); will-change: opacity, transform;
  }
  .hero-content .eyebrow {
    font-family: 'JetBrains Mono', monospace; font-size: clamp(0.6rem,1.4vw,0.75rem);
    letter-spacing: 0.4em; text-transform: uppercase; color: var(--yellow); margin-bottom: 1.2rem;
  }
  .hero-content h1 {
    font-family: 'Saira Condensed', sans-serif; font-weight:700; font-style:italic;
    font-size: clamp(3rem, 14vw, 10rem); letter-spacing: 0.01em; text-transform: uppercase; line-height: 0.86;
    background:linear-gradient(180deg,#ffffff 0%,#dfeaf8 16%,#8ea3bf 47%,#ffffff 52%,#6c81a0 66%,#c2d2e8 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 2px 30px rgba(150,190,255,0.35));
  }
  .hero-content .sub {
    margin-top: 1.3rem; font-size: clamp(0.95rem,2.2vw,1.3rem); color: #d6dee7; font-weight: 500; letter-spacing: 0.01em;
  }
  .hero-content .cta-row { margin-top: 2.2rem; display: flex; gap: 0.9rem; justify-content: center; flex-wrap: wrap; }
  .scroll-hint {
    position: absolute; left: 50%; bottom: 3vh; transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing: 0.3em;
    text-transform: uppercase; color: #6f7d8c; opacity: var(--hint, 1);
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
  }
  .scroll-hint .arrow { width: 1px; height: 26px; background: linear-gradient(#6f7d8c, transparent); }
  .sound-btn {
    position: fixed; bottom: 1.1rem; right: 1.1rem; z-index: 60;
    background: rgba(10,13,18,0.6); color: #c9d4e2; border: 1px solid #283341; border-radius: 999px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
    padding: 0.5rem 0.85rem; cursor: pointer; backdrop-filter: blur(6px);
  }
  .sound-btn:hover { border-color: var(--yellow); color: #fff; }

  /* ---------- SHARED SECTION ---------- */
  section.block { position: relative; z-index: 2; background: var(--bg); }
  .wrap { max-width: 1200px; margin: 0 auto; padding: clamp(4rem, 9vw, 8rem) clamp(1.2rem, 4vw, 3rem); }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--yellow); margin-bottom: 1.2rem;
  }
  h2.head {
    font-family: 'Saira Condensed', sans-serif; text-transform: uppercase; line-height: 0.95;
    font-size: clamp(2.1rem, 6vw, 4.2rem); letter-spacing: 0.01em; margin-bottom: 1.4rem;
  }
  h2.head .y { color: var(--yellow); }
  p.lead { font-size: clamp(1.05rem, 2.2vw, 1.3rem); color: #cdd6df; line-height: 1.6; max-width: 60ch; }
  p.body { color: var(--muted); line-height: 1.7; max-width: 62ch; }
  p.body + p.body { margin-top: 1rem; }

  /* lightning divider */
  .bolt-rule { display:flex; align-items:center; gap:0.8rem; color: var(--yellow); margin: 0 auto; width: fit-content; }
  .bolt-rule::before, .bolt-rule::after { content:""; height:1px; width:60px; background: linear-gradient(90deg, transparent, #2a333d); }
  .bolt-rule svg { width: 16px; height: 22px; }

  /* INTRO */
  .intro { text-align: center; }
  .intro .wrap { padding-top: clamp(3.5rem,7vw,6rem); padding-bottom: clamp(3.5rem,7vw,6rem); }
  .intro h2.head { max-width: 16ch; margin-left:auto; margin-right:auto; }

  /* TRUCK */
  .truck-grid { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: clamp(2rem,5vw,4.5rem); align-items: center; }
  @media (max-width: 880px){ .truck-grid{ grid-template-columns: 1fr; } }
  .truck-photo {
    position: relative; aspect-ratio: 16/11; border: 1px solid var(--line); overflow: hidden;
    background: #05070a center/cover no-repeat;
  }
  .features { list-style: none; margin-top: 2rem; display: grid; gap: 0.2rem; }
  .features li { display:flex; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--line); align-items:flex-start; }
  .features li:last-child { border-bottom: none; }
  .features .k { font-family:'Saira Condensed',sans-serif; text-transform:uppercase; font-size:1.15rem; letter-spacing:0.02em; color:#fff; min-width: 9.5rem; }
  .features .v { color: var(--muted); font-size: 0.95rem; line-height: 1.5; }

  /* INVENTORY */
  .inv { background: linear-gradient(180deg, #0a0d11 0%, #0c1015 100%); }
  .inv-head { display:flex; justify-content:space-between; align-items:flex-end; gap:2rem; flex-wrap:wrap; margin-bottom: 2.5rem; }
  .cards { display:grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  @media (max-width: 880px){ .cards{ grid-template-columns: repeat(2,1fr);} }
  @media (max-width: 540px){ .cards{ grid-template-columns: 1fr;} }
  .card {
    border: 1px solid var(--line); background: var(--panel); overflow: hidden;
    transition: border-color 0.2s, transform 0.2s; display:flex; flex-direction:column;
  }
  .card:hover { border-color: var(--yellow); transform: translateY(-3px); }
  .card .thumb {
    aspect-ratio: 4/3; background: linear-gradient(135deg, #141a21, #0b0f14);
    display:flex; align-items:center; justify-content:center; position: relative; border-bottom: 1px solid var(--line);
  }
  .card .thumb .ico { width: 30px; height: 40px; color:#33404c; }
  .card .thumb .ph { position:absolute; bottom:0.5rem; right:0.6rem; font-family:'JetBrains Mono',monospace; font-size:0.55rem; letter-spacing:0.15em; color:#3a4651; text-transform:uppercase;}
  .card .meta { padding: 1.1rem 1.2rem 1.3rem; }
  .card .meta .cat { font-family:'Saira Condensed',sans-serif; text-transform:uppercase; font-size:1.2rem; letter-spacing:0.02em; }
  .card .meta .ex { color: var(--muted); font-size: 0.85rem; margin-top: 0.35rem; line-height:1.5; }
  .inv-note { margin-top: 1.6rem; color:#6b7681; font-size: 0.85rem; }

  /* WHY */
  .why-grid { display:grid; grid-template-columns: repeat(3,1fr); gap: clamp(1.5rem,4vw,3rem); }
  @media (max-width: 880px){ .why-grid{ grid-template-columns:1fr; gap:2rem;} }
  .why-grid .col h3 { font-family:'Saira Condensed',sans-serif; text-transform:uppercase; font-size:1.5rem; letter-spacing:0.02em; margin-bottom:0.8rem; }
  .why-grid .col .num { font-family:'JetBrains Mono',monospace; color: var(--yellow); font-size:0.75rem; letter-spacing:0.2em; margin-bottom:1rem; }
  .why-grid .col p { color: var(--muted); line-height:1.65; font-size:0.95rem; }

  /* CREW */
  .crew { background: linear-gradient(180deg, #0c1015 0%, #06080b 100%); }
  .crew-grid { display:grid; grid-template-columns:1fr 1fr; gap: clamp(1.5rem,4vw,3rem); }
  @media (max-width: 760px){ .crew-grid{ grid-template-columns:1fr; gap:2.5rem; } }
  .person .role { font-family:'JetBrains Mono',monospace; color:var(--yellow); font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:0.6rem; }
  .person h3 { font-family:'Saira Condensed',sans-serif; text-transform:uppercase; font-size:2rem; letter-spacing:0.02em; margin-bottom:1rem; }
  .person p { color: var(--muted); line-height:1.7; font-size:0.95rem; }
  .person p + p { margin-top:0.8rem; }
  .person .names { color:#cdd6df; }

  /* ACADEMY */
  .academy { text-align:center; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    background: radial-gradient(120% 120% at 50% 0%, rgba(159,196,238,0.06), transparent 55%), var(--bg); }
  .academy .pill { display:inline-block; font-family:'JetBrains Mono',monospace; font-size:0.65rem; letter-spacing:0.25em; text-transform:uppercase;
    color:var(--yellow); border:1px solid #3a3a1a; border-radius:999px; padding:0.4rem 0.9rem; margin-bottom:1.5rem; }
  .academy p.lead { margin: 0 auto; }
  .notify { margin-top: 2rem; display:flex; gap:0.6rem; justify-content:center; flex-wrap:wrap; }
  .notify input {
    background:#0a0d11; border:1px solid var(--line); color:#fff; padding:0.7rem 1rem; border-radius:2px;
    font-family:'Inter',sans-serif; font-size:0.9rem; min-width: 240px;
  }
  .notify input:focus { outline:none; border-color: var(--yellow); }

  /* BOOK / CONTACT */
  .book { background: linear-gradient(180deg, #0a0d11, #05070a); text-align:center; }
  .book h2.head { max-width: 18ch; margin: 0 auto 1.6rem; }
  .book .sub { color:var(--muted); margin-bottom: 2.2rem; }
  .book .meta-row { margin-top:2.5rem; display:flex; gap:2rem; justify-content:center; flex-wrap:wrap; color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:0.78rem; letter-spacing:0.12em; text-transform:uppercase; }
  .book .meta-row a:hover { color: var(--yellow); }

  /* FOOTER */
  footer { background: #04060a; border-top:1px solid var(--line); padding: 2.5rem clamp(1.2rem,4vw,3rem); }
  .foot-in { max-width:1200px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap; }
  .foot-in .brand { font-family:'Saira Condensed',sans-serif; text-transform:uppercase; letter-spacing:0.04em; font-size:1.1rem; }
  .foot-in .brand .spark{ color:var(--yellow);}
  .foot-in .small { color:#6b7681; font-size:0.75rem; font-family:'JetBrains Mono',monospace; letter-spacing:0.1em; }

  @media (prefers-reduced-motion: reduce) {
    .hero-track { height: 100vh; }
    .hero-stage { position: relative; }
  }

  /* --- Voltage system overrides --- */
  .nav .brand,h2.head,.features .k,.card .meta .cat,.why-grid .col h3,.person h3,.foot-in .brand{font-weight:700;}
  .nav .brand{ font-style:italic; }
  .foot-in .brand{ font-style:italic; }
  h2.head .y, .eyebrow { color:#9fc4ee; }
  .hero-content h1{ font-style:italic; }
  /* ---------- Scroll-scrubbed frame-sequence hero ---------- */
  .fs-track{ height:320vh; position:relative; }
  .fs-stage{ position:sticky; top:0; height:100vh; overflow:hidden; background:#04060c; }
  .fs-canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .fs-grad{ position:absolute; inset:0; pointer-events:none; z-index:1;
    background:linear-gradient(180deg, rgba(4,6,12,0.35) 0%, rgba(4,6,12,0) 22%, rgba(4,6,12,0) 60%, rgba(4,6,12,0.85) 100%); }
  .fs-logo{ position:absolute; inset:0; z-index:4; display:flex; align-items:center; justify-content:center; padding:0 1.5rem;
    opacity:var(--introlo,1); transform:scale(var(--introsc,1)); transform-origin:center; will-change:opacity,transform; pointer-events:none; }
  .fs-logo .iword{ font-family:'Saira Condensed',sans-serif; font-weight:700; font-style:italic; text-transform:uppercase; text-align:center;
    font-size:clamp(3rem,13vw,9rem); letter-spacing:0.04em; line-height:0.88;
    background:linear-gradient(180deg,#ffffff 0%,#dfeaf8 30%,#9fb4ce 70%,#c2d2e8 100%); -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 2px 30px rgba(150,190,255,0.35)); }
  .fs-cta{ position:absolute; left:0; right:0; bottom:16vh; z-index:5; text-align:center; padding:0 1.5rem; opacity:var(--content,0); will-change:opacity; }
  .fs-cta .cta-row{ display:flex; gap:0.9rem; justify-content:center; flex-wrap:wrap; }
</style>
</head>

  <a href="#top" class="brand">Thunderstruck</a>
  <div class="links">
    <a href="camera.html">Camera</a>

<!-- HERO (scroll-scrubbed frame sequence) -->
<section class="fs-track" id="track">
  <div class="fs-stage">
    <canvas class="fs-canvas" id="fsCanvas"></canvas>
    <div class="fs-grad"></div>
    <div class="fs-logo" id="introLogo"><div class="iword">Thunderstruck</div></div>
    <div class="fs-cta" id="content">
      <div class="cta-row">
        <a href="grip-truck.html" class="btn">See the truck</a>
        <a href="rentals.html" class="btn ghost">Browse the kit</a>
      </div>
    </div>
    <div class="scroll-hint" id="hint"><span>Scroll</span><span class="arrow"></span></div>
  </div>
</section>



<script>
(() => {
  const N=105, PAD=3;
  const PATH=i=>`assets/hero-frames/frame-${String(i+1).padStart(PAD,'0')}.webp`;
  const cv=document.getElementById('fsCanvas'), ctx=cv.getContext('2d');
  const introLogo=document.getElementById('introLogo'), content=document.getElementById('content'),
        hint=document.getElementById('hint'), track=document.getElementById('track'),
        nav=document.getElementById('nav');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
  const ss=(e0,e1,x)=>{const t=clamp((x-e0)/(e1-e0),0,1);return t*t*(3-2*t);};
  const frames=new Array(N); let lastDrawn=-1;
  function ok(i){ const f=frames[i]; return f&&f.complete&&f.naturalWidth>0; }
  function nearest(idx){ if(ok(idx)) return idx;
    for(let d=1;d<N;d++){ if(idx-d>=0&&ok(idx-d)) return idx-d; if(idx+d<N&&ok(idx+d)) return idx+d; } return -1; }
  function sizeCanvas(){ const dpr=Math.min(devicePixelRatio||1,2); cv.width=Math.round(innerWidth*dpr); cv.height=Math.round(innerHeight*dpr); lastDrawn=-1; }
  function draw(idx){ const f=frames[idx]; if(!f||!f.naturalWidth) return;
    const cw=cv.width, ch=cv.height, iw=f.naturalWidth, ih=f.naturalHeight;
    const s=Math.max(cw/iw, ch/ih), w=iw*s, h=ih*s, x=(cw-w)/2, y=(ch-h)/2;
    ctx.drawImage(f,x,y,w,h); lastDrawn=idx; }
  // preload (frame 0 first so we can paint immediately)
  for(let i=0;i<N;i++){ const im=new Image(); im.decoding='async';
    im.onload=()=>{ if(i===0){ sizeCanvas(); draw(0); } else if(lastDrawn===-1){ draw(i);} };
    im.src=PATH(i); frames[i]=im; }
  let progress=0;
  function read(){ const r=track.getBoundingClientRect(); const sc=track.offsetHeight-innerHeight; progress=clamp(-r.top/sc,0,1);
    nav.classList.toggle('revealed', scrollY >= track.offsetHeight - innerHeight - 2); }
  function render(){
    const p=progress;
    const want=Math.round(p*(N-1)), use=nearest(want);
    if(use>=0 && use!==lastDrawn) draw(use);
    introLogo.style.setProperty('--introlo',(1-ss(0.02,0.42,p)).toFixed(3));
    introLogo.style.setProperty('--introsc',(1+0.26*ss(0,0.5,p)).toFixed(3));
    content.style.setProperty('--content',ss(0.74,0.97,p).toFixed(3));
    hint.style.setProperty('--hint',(1-ss(0,0.1,p)).toFixed(3));
    requestAnimationFrame(render);
  }
  if(reduce){
    introLogo.style.setProperty('--introlo','0'); content.style.setProperty('--content','1');
    hint.style.setProperty('--hint','0'); nav.classList.add('revealed');
    const last=new Image(); last.onload=()=>{ sizeCanvas(); draw(N-1); }; last.src=PATH(N-1); frames[N-1]=last;
    addEventListener('resize',()=>{ if(ok(N-1)){ sizeCanvas(); draw(N-1); } });
  } else {
    addEventListener('scroll',read,{passive:true});
    addEventListener('resize',()=>{ sizeCanvas(); read(); });
    read(); requestAnimationFrame(render);
  }
})();
</script>

<!-- Reflect the shared quote cart count in the nav (cart lives on the rental pages). -->
<script>
(function(){
  try{
    var r=localStorage.getItem('ts-cart'); var n=0;
    if(r){ var c=(JSON.parse(r)||{}).cart||{}; n=Object.values(c).reduce(function(a,b){return a+(b||0);},0); }
    var el=document.getElementById('cartCount');
    if(el){ el.textContent=n; el.classList.toggle('zero', n===0); }
  }catch(e){}
})();
</script>
